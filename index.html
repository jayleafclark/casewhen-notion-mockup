function sensitivePage(){
 var h='<div class="callout a"><span>⛔</span><span><b>Notion cannot redact anything. There is no masking, no click-to-reveal, and no per-column permission.</b> Notion has exactly one access axis: <b>which pages you can open</b>. There is no second axis for which parts of a page you can see. So the rule we build on is: <b>if a person can open the page, treat every value on it as disclosed to them.</b></span></div>';
 h+='<div class="h3">🎭 What looks like protection but is not</div><table><thead><tr><th>People assume…</th><th>What it actually is</th></tr></thead><tbody>';
 [['A toggle hides the value','<b>Cosmetic only.</b> The content is already on the reader’s device. One click, Ctrl-F (Notion auto-expands to the match), the API, and HTML/markdown export all return it. It is the security equivalent of white text on a white background. <i>PDF export happens to omit it — that is a rendering quirk, not a control.</i>'],
  ['“Hide property” in a view hides the column','A <b>view setting</b>, not a permission. Open the row and every property is there; anyone who can edit the view can unhide it.'],
  ['Row-level access rules can hide the salary column','They restrict <b>rows, never columns</b> — and <b>broadest access wins</b>: if someone also has teamspace access, the row rule does not claw it back. Fine for reducing incidental visibility; not a control you can attest to.'],
  ['The integration only reads what we show it','<b>Every connected integration reads every property</b>, collapsed or not. There is no permissions endpoint in the Notion API — it cannot be constrained after the fact. Each integration on an HR page is a full-fidelity export path.'],
  ['Enterprise encryption protects it from staff','Customer-managed keys change who controls the keys relative to <b>Notion</b>. They do not stop a workspace member reading a value. Audit logs tell you who looked; they do not stop anyone looking.']
 ].forEach(function(r){h+='<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>';});
 h+='</tbody></table>';
 h+='<div class="callout"><span>👀</span><span><b>“But I have seen Notion put dots over a value.”</b> Worth settling, because it is the exact trap. You can absolutely <b>display</b> dots — store the literal characters, or use a formula, or hide the real value behind a toggle. <b>The dots on the Personnel page in this very mockup are literally the stored text.</b> What no version of that does is stop someone seeing the real value: if it is stored in Notion at all, one click, Ctrl-F, the API or an export returns it. So dots are worth keeping as <b>screen-share courtesy</b> — they stop a number being read over your shoulder on a call. They are decoration on top of permissions, never a substitute for them.</span></div>';
 h+='<div class="h3">📍 So where does each thing actually live?</div><table><thead><tr><th>Data</th><th>Lives in</th><th>What Notion holds</th></tr></thead><tbody>';
 [['<b>IBAN / bank details</b>','lexoffice + the Finance drive','<b>Nothing.</b> Not even masked — a link at most.'],
  ['<b>Tax ID · SV number · passport</b>','The admin Drive, in the person’s folder','A link only. The Drive ACL is the gate.'],
  ['<b>Salary &amp; comp history</b>','A <b>private teamspace</b> — “People · Confidential”, Austin &amp; Saju only','The value, but <b>only inside that teamspace</b>. Never a column on any shared People database.'],
  ['<b>Freelancer day rates</b>','The same private teamspace','Never on the shared Freelancer or Client pages.'],
  ['<b>Client pricing / SOW value</b>','Admin → Commercial','Never on the client page the team can open.'],
  ['Employment dates · role · manager','The shared People record','Fine in the open — not sensitive.']
 ].forEach(function(r){h+='<tr><td>'+r[0]+'</td><td>'+r[1]+'</td><td>'+r[2]+'</td></tr>';});
 h+='</tbody></table>';
 h+='<div class="h3">🚧 Four rules that keep it true</div><ul class="chk">';
 ['<b>Never put a sensitive value in a page title.</b> Relation properties render the related page’s <i>title</i> to people who cannot open it — the title is the leak.',
  '<b>No rollups of sensitive numbers into a shared database.</b> A rollup pulls the value across the wall and defeats the whole design.',
  '<b>A toggle is screen-share courtesy, nothing more.</b> If we use one, it is labelled as such — never described to anyone as a permission.',
  '<b>Inventory every integration</b> connected to a page holding sensitive values, and review it on the same cadence as the membership list.'
 ].forEach(function(x){h+='<li><span class="box"></span><span>'+x+'</span></li>';});
 h+='</ul>';
 h+='<div class="callout"><span>⚖️</span><span><b>Why this matters beyond tidiness.</b> Salary, IBAN and tax IDs are financial and identification data about employees. Under GDPR the technical measure has to be real: “access is restricted to two named people in a private teamspace, reviewed quarterly” is defensible. <b>“It is inside a toggle” is not</b> — and it is arguably worse than nothing, because it creates a record of a control that was never enforced.</span></div>';
 h+='<div class="callout a"><span>❓</span><span><b>Two things to confirm with Notion before go-live:</b> whether <b>EU data residency</b> applies to this workspace (German company, EU employee data), and the exact scope of customer-managed encryption if it is ever used in a compliance claim.</span></div>';
 return pageShell('🔐','Sensitive data',null,h);
}

 var root=spName?'<a data-go="home">'+spName+'</a><span class="sep">/</span>':'';
 if(id=='client')return root+'<a data-go="clients">Clients</a><span class="sep">/</span><b>'+CL[seg].n+'</b>';
 if(id=='project')return root+'<a data-go="projects">Client Projects</a><span class="sep">/</span><b>'+PR[seg].n+'</b>';
 if(id=='task')return root+'<a data-go="tasks">Tasks</a><span class="sep">/</span><b>'+TK[seg].n+'</b>';
 if(id=='person')return root+'<a data-go="ppl">People</a><span class="sep">/</span><a data-go="personnel">Personnel</a><span class="sep">/</span><b>'+PEO[seg].n+'</b>';
 if(id=='meeting')return root+'<a data-go="meetings">Meetings</a><span class="sep">/</span><b>'+MTG[seg].t+'</b>';
 var par=CHILDPAR[id]?'<a data-go="'+CHILDPAR[id]+'">'+PARENTS[CHILDPAR[id]].nm+'</a><span class="sep">/</span>':'';
 return root+par+'<b>'+lbl(id)[1]+'</b>';
}

  ['🎙️ Internal team meeting','webhook','no client attendee → internal','Meetings (internal) + Decision Log','if a decision / owner lands','team',S.team],
  ['🎙️ Candidate call','webhook / manual','role + email → candidate','Candidates','next-step task','admin',S.admin],

  ['📄 Drive file · admin path','changes.watch','path finance · legal · tax · people','Contract Register · Personnel · Compliance','if it’s a renewal / action','admin — Drive ACL is the gate',S.admin],
  ['📝 Intake form','webhook','by module','team modules → Client project; admin modules → admin area','kickoff tasks','team modules → team; billing · legal · SOW → admin',S.split],
  ['🏆 Attio “Won”','webhook','deal → client','creates Client Project + Onboarding rows','the kickoff task set','team — new project — + admin for SOW / billing',S.split],

 h+='<div style="overflow-x:auto"><table style="min-width:1080px"><thead><tr>'+['Incoming','Detected by','Cerebro classifies →','Lands in Notion','Creates a task?','Slack alert','Sees it'].map(function(c){return '<th>'+c+'</th>';}).join('')+'</tr></thead><tbody>'+rows.map(function(r){return '<tr>'+r.map(function(v,i){return '<td'+(i==0?' style="font-weight:500;white-space:nowrap"':'')+'>'+v+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table></div>';

 h+='</div>';
 // Channel gate
 h+='<div class="h3" style="margin-top:22px">🔒 Which channel — the sensitivity gate</div>';

 // The task contract
 h+='<div class="h3" style="margin-top:26px">✅ Every task Cerebro creates carries — no exceptions</div>';
 h+='<ul class="chk">'+[
  'Assignee — a resolved person (email → Notion user). Never a guess; unresolved → parked + asked.',

  'Client task → the file sits in 06 Clients/NN <Client>/ (00-brief · 01-deliverables · 02-data-models · 03-reports · 04-handover), and the sub-folder is created if missing.',

 h+='</div>';
 return pageShell('🔀','Data flow',null,h);
}
