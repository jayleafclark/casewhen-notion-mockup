<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>CaseWhen — Notion workspace (mockup)</title>
<style>
:root{
  --bg:#ffffff;--side:#f7f7f5;--ink:#37352f;--muted:#9b9a97;--faint:#c7c6c2;
  --line:#ededec;--line2:#e9e9e7;--hover:#efefee;--sel:#e8f2ef;
  --green:#1d967c;--green-d:#177e68;
}
*{box-sizing:border-box}
.app{font-family:ui-sans-serif,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);margin:0;display:grid;grid-template-columns:260px 1fr;height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
/* sidebar */
.side{background:var(--side);border-right:1px solid var(--line2);display:flex;flex-direction:column;overflow-y:auto;padding:8px 0}
.ws{display:flex;align-items:center;gap:8px;padding:8px 12px;margin:0 6px;border-radius:6px;cursor:pointer}
.ws:hover{background:var(--hover)}
.wsico{width:22px;height:22px;border-radius:5px;background:var(--green);color:#fff;font-weight:700;font-size:12px;display:grid;place-items:center;flex:none}
.wsname{font-weight:600;font-size:14px}
.wschev{margin-left:auto;color:var(--muted);font-size:11px}
.sgroup{margin-top:12px}
.ghead{display:flex;align-items:center;gap:5px;padding:3px 14px;color:var(--muted);font-size:11.5px;font-weight:600;letter-spacing:.02em;text-transform:none;cursor:pointer;user-select:none}
.ghead .lk{margin-left:auto;font-size:10px}
.ghead:hover{color:var(--ink)}
.nav{display:flex;flex-direction:column}
.nav a{display:flex;align-items:center;gap:8px;padding:4px 14px 4px 22px;color:var(--ink);text-decoration:none;font-size:13.5px;cursor:pointer;border-radius:0}
.nav a:hover{background:var(--hover)}
.nav a.on{background:var(--sel);font-weight:500}
.nav a .ico{width:18px;text-align:center;flex:none;font-size:14px;opacity:.9}
.nav a .cnt{margin-left:auto;color:var(--faint);font-size:11px}
.newbadge{background:#DBEEE9;color:#177e68;font-size:9px;font-weight:700;border-radius:4px;padding:0 4px;margin-left:6px}
.sfoot{margin-top:auto;padding:10px 16px;color:var(--faint);font-size:11px;border-top:1px solid var(--line2)}
/* main */
.main{overflow-y:auto;background:var(--bg)}
.topbar{display:flex;align-items:center;gap:8px;padding:9px 18px;color:var(--muted);font-size:13px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:2}
.topbar .crumb{color:var(--muted)}.topbar .crumb b{color:var(--ink);font-weight:500}
.topbar .lockb{margin-left:8px;font-size:11px;color:var(--muted);background:var(--side);border:1px solid var(--line2);border-radius:5px;padding:1px 7px}
.page{padding:26px 46px 80px;max-width:1180px}
.ptitle{display:flex;align-items:center;gap:11px;font-size:30px;font-weight:700;margin:0 0 6px}
.ptitle .pico{font-size:30px}
.pdesc{color:var(--muted);font-size:13.5px;margin:0 0 4px;max-width:80ch;line-height:1.5}
.pmeta{display:flex;gap:8px;align-items:center;margin:12px 0 6px}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:0}
.tab{font-size:13px;color:var(--muted);padding:6px 9px;border-bottom:2px solid transparent;cursor:default}
.tab.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:500}
.rowcount{color:var(--faint);font-size:12px;margin-left:6px}
/* table */
table{border-collapse:collapse;width:100%;margin-top:2px}
th{text-align:left;font-weight:400;color:var(--muted);font-size:12.5px;padding:7px 10px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);white-space:nowrap}
th .ti{opacity:.6;margin-right:4px;font-size:11px}
th:first-child{padding-left:6px}
td{padding:7px 10px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);font-size:13.5px;vertical-align:middle}
td:first-child{font-weight:500}
tr:hover td{background:#fbfbfa}
.title-cell{display:flex;align-items:center;gap:7px}
.title-cell .di{opacity:.85}
/* pills */
.pill{display:inline-flex;align-items:center;border-radius:4px;padding:2px 8px;font-size:12px;line-height:1.4;white-space:nowrap}
.p-green{background:#DBEEE9;color:#177e68}
.p-amber{background:#FBEFD3;color:#95661a}
.p-grey{background:#E9E9E7;color:#605c57}
.p-teal{background:#D6E8EA;color:#2a6b72}
.p-rose{background:#F4E2DB;color:#9a4b34}
.p-blue{background:#DEE7EF;color:#3a5a78}
.p-purple{background:#E8E2F0;color:#5b4a7a}
.multi{display:flex;gap:4px;flex-wrap:wrap}
.person{display:inline-flex;align-items:center;gap:6px}
.av{width:20px;height:20px;border-radius:50%;color:#fff;font-size:10px;font-weight:600;display:grid;place-items:center;flex:none}
.lnk{color:#3a5a78;text-decoration:none;border-bottom:1px solid #cdd8e2}
.rel{background:#efeff0;border-radius:4px;padding:1px 7px;font-size:12px;color:var(--ink)}
.mut{color:var(--muted)}
.chk{color:var(--green)}
.mask{letter-spacing:1px;color:var(--faint)}
/* board */
.board{display:flex;gap:14px;overflow-x:auto;padding-top:8px}
.bcol{min-width:240px;flex:1}
.bch{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;padding:4px 4px 8px;color:var(--ink)}
.bch .bc{color:var(--faint);font-size:12px}
.bch .dot{width:8px;height:8px;border-radius:50%}
.card{background:#fbfbfa;border:1px solid var(--line2);border-radius:7px;padding:9px 11px;margin-bottom:8px;box-shadow:0 1px 1px rgba(0,0,0,.03)}
.card .ct{font-size:13.5px;font-weight:500;margin-bottom:7px}
.card .cm{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
/* dashboard */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px}
.dcard{border:1px solid var(--line2);border-radius:10px;padding:14px 16px;background:var(--bg)}
.dcard.full{grid-column:1/3}
.dch{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;margin-bottom:10px}
.dch .di{font-size:15px}
.dch .cnt{margin-left:auto;font-size:11px;color:var(--muted);background:var(--side);border:1px solid var(--line2);border-radius:20px;padding:1px 9px}
.drow{display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--line);font-size:13px}
.drow:first-of-type{border-top:0}
.drow .dl{margin-left:auto;color:var(--muted);font-size:12px;white-space:nowrap}
.warn{background:#FBEFD3;color:#95661a;border:1px solid #f0dda6;border-radius:7px;padding:8px 11px;font-size:12.5px;margin-top:8px}
.exclude{margin-top:18px;font-size:12.5px;color:var(--muted);background:var(--side);border:1px dashed var(--line2);border-radius:8px;padding:10px 14px}
.callout{background:var(--side);border:1px solid var(--line2);border-radius:8px;padding:10px 13px;font-size:13px;color:var(--ink);margin:10px 0 14px;display:flex;gap:8px;align-items:flex-start}
.callout .ci{font-size:15px}
h2.sec{font-size:15px;margin:22px 0 2px}
/* folder tree */
.mirror{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12.5px;color:var(--muted);margin:6px 0 16px}
.mirror .tool{background:var(--side);border:1px solid var(--line2);border-radius:6px;padding:3px 9px;color:var(--ink);font-weight:500}
.fcols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fcard{border:1px solid var(--line2);border-radius:10px;overflow:hidden}
.fcard .fh{padding:10px 14px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
.fcard.team .fh{background:#eef7f4;color:#177e68}
.fcard.admin .fh{background:#fbf3e0;color:#95661a}
.tree{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:12.5px;line-height:1.85;padding:12px 14px;color:var(--ink);overflow-x:auto}
.tree .fl{white-space:pre}
.tree .fo{color:var(--ink)}
.tree .cl{color:#177e68}
.tree .nm{color:#95661a}
.tree .cm{color:var(--faint)}
.subset{background:var(--sel);border:1px solid #cfe3dd;border-radius:10px;padding:12px 16px;margin-top:16px}
.subset .st{font-weight:600;font-size:13.5px;margin-bottom:8px}
.subset .chips{display:flex;flex-wrap:wrap;gap:6px}
.subset .fchip{background:#fff;border:1px solid var(--line2);border-radius:6px;padding:4px 10px;font-size:12.5px;font-family:ui-monospace,Menlo,Consolas,monospace}
</style>

// ---------- build sidebar ----------
function navItem(id){var p=PAGES[id];var cnt=p.rows?p.rows.length:(p.board?p.board.reduce(function(a,c){return a+(c.count||c.cards.length)},0):'');
 var nbadge=(id=='clients'||id=='people'||id=='cprojects'||id=='actions'||id=='meetings')?'':'';
 return '<a data-pg="'+id+'"><span class="ico">'+p.icon+'</span>'+p.name+(p.lock&&p.space=='admin'?'':'')+'<span class="cnt">'+(cnt||'')+'</span></a>';}

// ---------- cell renderer ----------
function cell(val,type){
 if(val==null)return '<span class="mut">—</span>';
 if(type=='pill'){return pill(val[0],val[1]);}
 if(type=='person'){return val=='—'?'<span class="mut">—</span>':av(val);}
 if(type=='multi'){return multi(val);}
 if(type=='rel'){return val.length?rel(val):'<span class="mut">—</span>';}
 if(type=='mask'){return '<span class="mask">'+val+'</span>';}
 if(type=='email'){return val.indexOf('@')>-1?'<span class="mut">'+val+'</span>':'<span class="mut">'+val+'</span>';}
 if(type=='text'){return Array.isArray(val)?val[0]:('<span>'+val+'</span>');}
 if(type=='title'){ // may carry |NEW
   var nbf=/\|NEW$/.test(val);var name=val.replace(/\|NEW$/,'');
   return '<span class="title-cell"><span class="di">▦</span>'+name+(nbf?nb():'')+'</span>';}
 return val;
}
function typeIcon(t){return ({title:'',text:'≡',pill:'◉',person:'🙂',email:'@',multi:'≡',rel:'↗',mask:'•',number:'#'})[t]||'≡';}

function renderTable(p){

 if(p.callout)h+='<div class="callout"><span class="ci">🔒</span><span>'+p.callout+'</span></div>';
 h+='<div class="tabs"><span class="tab on">▦ Table</span><span class="rowcount">'+p.rows.length+' rows</span></div>';
 h+='<table><thead><tr>'+p.cols.map(function(c){return '<th><span class="ti">'+typeIcon(c[1])+'</span>'+c[0]+'</th>';}).join('')+'</tr></thead><tbody>';
 h+=p.rows.map(function(r){return '<tr>'+r.map(function(v,i){return '<td>'+cell(v,p.cols[i][1])+'</td>';}).join('')+'</tr>';}).join('');
 h+='</tbody></table>';
 if(p.after)h+=p.after;
 return h;
}

 }).join('');
 h+='</div>';
 return h;
}

// ---------- router ----------
function show(id){
 var p=PAGES[id];var el=document.getElementById('page');
 if(id=='dash')el.innerHTML=renderDash();
 else if(p.type=='folders')el.innerHTML=renderFolders(p);
 else if(p.type=='board')el.innerHTML=renderBoard(p);
 else if(p.type=='doc')el.innerHTML=renderDoc(p);
 else el.innerHTML=renderTable(p);
 // crumb + lock
 var spaceName=p.space=='admin'?'Admin':(p.space=='team'?'Team':'');
 document.getElementById('crumb').innerHTML=(spaceName?spaceName+' / ':'')+'<b>'+p.name+'</b>';
 document.getElementById('lockb').style.display=(p.space=='admin')?'inline':'none';
 document.querySelectorAll('.nav a').forEach(function(a){a.classList.toggle('on',a.dataset.pg===id);});
 document.querySelector('.main').scrollTo(0,0);
}
document.querySelectorAll('.nav a').forEach(function(a){a.addEventListener('click',function(){show(a.dataset.pg);});});
