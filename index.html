*{box-sizing:border-box}
.app{font-family:ui-sans-serif,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);margin:0;display:grid;grid-template-columns:262px 1fr;height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
.side{background:var(--side);border-right:1px solid var(--line2);display:flex;flex-direction:column;overflow-y:auto;padding:8px 0}
.ws{display:flex;align-items:center;gap:8px;padding:8px 12px;margin:0 6px}
.wsico{width:22px;height:22px;border-radius:5px;background:var(--green);color:#fff;font-weight:700;font-size:12px;display:grid;place-items:center;flex:none}
.wsname{font-weight:600}
.ghead{display:flex;align-items:center;gap:5px;padding:13px 14px 3px;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.02em}
.ghead .lk{margin-left:auto;font-size:10px}
.nav a{display:flex;align-items:center;gap:8px;padding:3.5px 14px 3.5px 20px;color:var(--ink);text-decoration:none;font-size:13.5px;cursor:pointer}
.nav a:hover{background:var(--hover)}.nav a.on{background:var(--sel);font-weight:500}
.nav a .ico{width:18px;text-align:center;flex:none;opacity:.9}
.navp{display:flex;align-items:center;padding:3.5px 14px 3.5px 8px;cursor:pointer;font-weight:500;color:var(--ink)}
.navp:hover{background:var(--hover)}
.navp .chev{width:16px;text-align:center;color:var(--muted);font-size:10px;flex:none}
.navp .plabel{display:flex;align-items:center;gap:8px;font-size:13.5px}
.navp .plabel .ico{width:18px;text-align:center;flex:none}
.sfoot{margin-top:auto;padding:10px 16px;color:var(--faint);font-size:11px;border-top:1px solid var(--line2)}
.main{overflow-y:auto}
.topbar{display:flex;align-items:center;gap:6px;padding:9px 18px;color:var(--muted);font-size:13px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:3}
.crumb a{color:var(--muted);text-decoration:none;cursor:pointer}.crumb a:hover{text-decoration:underline}
.crumb b{color:var(--ink);font-weight:500}.crumb .sep{color:var(--faint);margin:0 5px}
.lockb{margin-left:8px;font-size:11px;color:var(--muted);background:var(--side);border:1px solid var(--line2);border-radius:5px;padding:1px 7px}
.page{padding:22px 44px 90px;max-width:1200px}
.ptitle{display:flex;align-items:center;gap:11px;font-size:29px;font-weight:700;margin:0 0 6px}.ptitle .pico{font-size:29px}
.pdesc{color:var(--muted);font-size:13px;margin:0 0 6px;max-width:84ch;line-height:1.5}
.tabs{display:flex;gap:1px;border-bottom:1px solid var(--line);margin:14px 0 0;flex-wrap:wrap}
.tab{font-size:13px;color:var(--muted);padding:6px 10px;border-bottom:2px solid transparent;cursor:pointer}
.tab:hover{color:var(--ink)}.tab.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:500}
.rowcount{color:var(--faint);font-size:12px;margin-left:6px}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--green);color:#fff;border:0;border-radius:6px;padding:6px 12px;font-size:13px;font-weight:500;cursor:pointer;margin:12px 0 4px}
table{border-collapse:collapse;width:100%;margin-top:4px}
th{text-align:left;font-weight:400;color:var(--muted);font-size:12.5px;padding:7px 10px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);white-space:nowrap}
th .ti{opacity:.55;margin-right:4px;font-size:11px}
td{padding:7px 10px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);font-size:13.5px;vertical-align:middle}
td:first-child{font-weight:500}
tr.click{cursor:pointer}tr.click:hover td{background:#f6faf9}
.title-cell{display:flex;align-items:center;gap:7px}.title-cell .di{opacity:.8}
.opener{color:var(--faint);font-size:11px;margin-left:6px;opacity:0}tr.click:hover .opener{opacity:1}
.pill{display:inline-flex;align-items:center;border-radius:4px;padding:2px 8px;font-size:12px;white-space:nowrap}
.p-green{background:#DBEEE9;color:#177e68}.p-amber{background:#FBEFD3;color:#95661a}.p-grey{background:#E9E9E7;color:#605c57}
.p-teal{background:#D6E8EA;color:#2a6b72}.p-rose{background:#F4E2DB;color:#9a4b34}.p-blue{background:#DEE7EF;color:#3a5a78}.p-purple{background:#E8E2F0;color:#5b4a7a}

.person{display:inline-flex;align-items:center;gap:6px}
.av{width:20px;height:20px;border-radius:50%;color:#fff;font-size:10px;font-weight:600;display:grid;place-items:center;flex:none}
.lnk{color:#3a5a78;text-decoration:none;border-bottom:1px solid #cdd8e2;cursor:pointer}
.rel{background:#eef0f0;border-radius:4px;padding:1px 8px;font-size:12.5px;color:var(--ink);cursor:pointer;display:inline-block}.rel:hover{background:#e2e6e6}
.mut{color:var(--muted)}.mask{letter-spacing:1px;color:var(--faint)}
.newbadge{background:#DBEEE9;color:#177e68;font-size:9px;font-weight:700;border-radius:4px;padding:0 4px;margin-left:6px}
.board{display:flex;gap:14px;overflow-x:auto;padding-top:12px}
.bcol{min-width:230px;flex:1}
.bch{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;padding:4px 4px 8px}.bch .bc{color:var(--faint);font-size:12px}.bch .dot{width:8px;height:8px;border-radius:50%}
.card{background:#fbfbfa;border:1px solid var(--line2);border-radius:7px;padding:9px 11px;margin-bottom:8px;box-shadow:0 1px 1px rgba(0,0,0,.03);cursor:pointer}.card:hover{background:#f4f8f7}
.card .ct{font-size:13.5px;font-weight:500;margin-bottom:7px}.card .cm{display:flex;align-items:center;gap:6px;flex-wrap:wrap}

.chk{list-style:none;padding:0;margin:0}

.chk li.done .box{background:var(--green);border-color:var(--green)}.chk li.done>span{color:var(--muted);text-decoration:line-through}
.callout{background:var(--side);border:1px solid var(--line2);border-radius:8px;padding:10px 13px;font-size:13px;margin:10px 0;display:flex;gap:9px;align-items:flex-start}

.bodytext{font-size:13.5px;color:#4a4744;line-height:1.6;max-width:78ch}

.dcard{border:1px solid var(--line2);border-radius:10px;padding:14px 16px}.dcard.full{grid-column:1/3}

.warn{background:#FBEFD3;color:#95661a;border:1px solid #f0dda6;border-radius:7px;padding:8px 11px;font-size:12.5px;margin-top:8px}
.exclude{margin-top:18px;font-size:12.5px;color:var(--muted);background:var(--side);border:1px dashed var(--line2);border-radius:8px;padding:10px 14px}
.rail{border-top:1px solid var(--line)}

 return '<div class="card" data-open="task/'+id+'"><div class="ct">'+t.n+'</div><div class="cm">'+(t.a?av(t.a):'<span class="mut">unassigned</span>')+(t.dd?'<span class="mut">'+t.dd+'</span>':'')+tag+'</div></div>';}
function statusBoard(ids,cols){return '<div class="board">'+cols.map(function(st){var items=ids.filter(function(k){return TK[k].s==st;});return '<div class="bcol"><div class="bch"><span class="dot" style="background:'+TSDOT[TS[st]]+'"></span>'+st+'<span class="bc">'+items.length+'</span></div>'+(items.map(taskRow).join('')||'<div class="mut" style="font-size:12px;padding:4px">—</div>')+'</div>';}).join('')+'</div>';}

// -------- Tasks GTD views --------
var TASK_VIEWS=[['board','▥ Board'],['inbox','📥 Inbox'],['assignee','👥 By Assignee'],['project','📊 By Project'],['all','▦ All']];
function tasksView(view){
 var ids=Object.keys(TK);
 var h='<p class="pdesc">The single GTD database — every idea, reminder and to-do lands here, gets processed, then worked on the board. Board columns are CaseWhen’s real Notion statuses: Not started · In Progress · External Block · Done.</p>';
 h+='<div class="tabs">'+TASK_VIEWS.map(function(v){return '<span class="tab'+(v[0]==view?' on':'')+'" data-view="'+v[0]+'">'+v[1]+'</span>';}).join('')+'</div>';
 if(view=='inbox'){var inbox=ids.filter(function(k){return TK[k].inbox;});h+='<p class="mut" style="font-size:12.5px;margin:12px 0 4px">Unprocessed captures — assign an owner, a due date and a project/area to process each.</p><div style="max-width:640px">'+inbox.map(taskRow).join('')+'</div>';}
 else if(view=='assignee'){var people=['Zsolt','Dipro','Austin','Saju','Ana'];h+='<div class="board">'+people.map(function(pn){var items=ids.filter(function(k){return TK[k].a==pn&&TK[k].s!='Done';});return '<div class="bcol"><div class="bch">'+av(pn)+'<span class="bc">'+items.length+'</span></div>'+(items.map(taskRow).join('')||'<div class="mut" style="font-size:12px;padding:4px">—</div>')+'</div>';}).join('')+'</div>';}
 else if(view=='project'){var projs=Object.keys(PR).filter(function(p){return Object.keys(TK).some(function(k){return TK[k].proj==p&&TK[k].s!='Done';});});h+='<div class="board">'+projs.map(function(p){var items=Object.keys(TK).filter(function(k){return TK[k].proj==p&&TK[k].s!='Done';});return '<div class="bcol"><div class="bch">'+PR[p].n.split(' — ')[0]+'<span class="bc">'+items.length+'</span></div>'+(items.map(taskRow).join('')||'<div class="mut" style="font-size:12px;padding:4px">—</div>')+'</div>';}).join('')+'</div>';}
 else if(view=='all'){h+='<table style="margin-top:12px"><thead><tr><th>Task</th><th>Status</th><th>Assignee</th><th>Due</th><th>Project / Area</th></tr></thead><tbody>'+ids.map(function(k){var t=TK[k];return '<tr class="click" data-open="task/'+k+'"><td><span class="title-cell"><span class="di">▦</span>'+t.n+'</span></td><td>'+pill(t.s,TS[t.s])+'</td><td>'+(t.a?av(t.a):'<span class="mut">—</span>')+'</td><td>'+(t.dd||'<span class="mut">—</span>')+'</td><td>'+(t.proj?'<span class="rel">'+PR[t.proj].n+'</span>':(t.area?pill(t.area,'purple'):'—'))+'</td></tr>';}).join('')+'</tbody></table>';}
 else {h+=statusBoard(ids.filter(function(k){return TK[k].s!='Done';}).concat(ids.filter(function(k){return TK[k].s=='Done';})),TASK_COLS);}
 return h;
}

// ===================== router =====================
var curView='board';
function crumbFor(id,seg){var sp=SPACE[id]||(id=='client'||id=='project'||id=='task'||id=='meeting'?'team':(id=='person'?'admin':''));
 var spName=sp=='team'?'Delivery':(sp=='admin'?'Admin':(sp=='my'?'My Space':''));
 var root=spName?'<a data-go="home">'+spName+'</a><span class="sep">/</span>':'';
 if(id=='client')return root+'<a data-go="clients">Clients</a><span class="sep">/</span><b>'+CL[seg].n+'</b>';
 if(id=='project')return root+'<a data-go="projects">Client Projects</a><span class="sep">/</span><b>'+PR[seg].n+'</b>';
 if(id=='task')return root+'<a data-go="tasks">Tasks</a><span class="sep">/</span><b>'+TK[seg].n+'</b>';
 if(id=='person')return root+'<a data-go="ppl">People</a><span class="sep">/</span><a data-go="personnel">Personnel</a><span class="sep">/</span><b>'+PEO[seg].n+'</b>';
 if(id=='meeting')return root+'<a data-go="meetings">Meetings</a><span class="sep">/</span><b>'+MTG[seg].t+'</b>';
 var par=CHILDPAR[id]?'<a data-go="'+CHILDPAR[id]+'">'+PARENTS[CHILDPAR[id]].nm+'</a><span class="sep">/</span>':'';
 return root+par+'<b>'+lbl(id)[1]+'</b>';
}
function render(route){var seg=route.split('/');var id=seg[0];var el=document.getElementById('page');
 var R={home:homePage,folders:foldersPage,dash:dashPage,adminboard:adminBoard,personnel:renderPersonnel,mytasks:myTasks,my1on1:my1on1,clients:clientsTable,projects:projectsBoard,entity:entityPage,contracts:contractsPage,compliance:compliancePage,deals:dealsBoard,onboarding:onboardingPage,calendar:calendarPage,meetings:meetingsPage,handbook:handbookPage,intake:intakePage};
 if(id=='tasks')el.innerHTML=pageShell('📥','Tasks',null,tasksView(curView));
 else if(id=='client')el.innerHTML=clientDetail(seg[1]);
 else if(id=='project')el.innerHTML=projectDetail(seg[1]);
 else if(id=='task')el.innerHTML=taskDetail(seg[1]);
 else if(id=='meeting')el.innerHTML=meetingDetail(seg[1]);
 else if(id=='person')el.innerHTML=personDetail(seg[1]);
 else if(PARENTS[id])el.innerHTML=parentPage(id);
 else if(R[id])el.innerHTML=R[id]();
 else if(TBL[id])el.innerHTML=pageShell(TBL[id].ic,TBL[id].nm,TBL[id].desc,tableHTML(TBL[id]));
 else el.innerHTML='<p class="mut">—</p>';
 document.getElementById('crumb').innerHTML=crumbFor(id,seg[1]);
 var sp=SPACE[id]||(id=='client'||id=='project'||id=='task'||id=='meeting'?'team':(id=='person'?'admin':''));
 var lb=document.getElementById('lockb');
 if(sp=='admin'){lb.style.display='inline';lb.textContent='🔒 Private · Austin · Saju · Ana';}
 else if(sp=='my'){lb.style.display='inline';lb.textContent='👤 Private to you';}
 else lb.style.display='none';
 curId=id;highlight(id);
 bindOpens();document.querySelector('.main').scrollTo(0,0);
}
function go(route){render(route);}window.go=go;
function bindOpens(){document.querySelectorAll('[data-open]').forEach(function(e){e.onclick=function(ev){ev.stopPropagation();go(e.getAttribute('data-open'));};});document.querySelectorAll('.tab[data-view]').forEach(function(t){t.onclick=function(){curView=t.getAttribute('data-view');go('tasks');};});}
document.getElementById('sidebar').addEventListener('click',function(ev){
 var t=ev.target.closest('[data-toggle]');if(t){COLLAPSED[t.dataset.toggle]=!COLLAPSED[t.dataset.toggle];buildSidebar();return;}
 var a=ev.target.closest('[data-go]');if(a)go(a.dataset.go);});
document.getElementById('crumb').addEventListener('click',function(ev){var a=ev.target.closest('[data-go]');if(a)go(a.dataset.go);});
document.getElementById('page').addEventListener('click',function(ev){var a=ev.target.closest('[data-go]');if(a){ev.stopPropagation();go(a.dataset.go);}});
go('home');
</script>
