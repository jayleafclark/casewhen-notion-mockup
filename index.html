<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>CaseWhen — Notion workspace (mockup v2)</title>
<style>
:root{--bg:#fff;--side:#f7f7f5;--ink:#37352f;--muted:#9b9a97;--faint:#c7c6c2;--line:#ededec;--line2:#e9e9e7;--hover:#efefee;--sel:#e8f2ef;--green:#1d967c;--green-d:#177e68}
*{box-sizing:border-box}
.app{font-family:ui-sans-serif,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);margin:0;display:grid;grid-template-columns:256px 1fr;height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
.side{background:var(--side);border-right:1px solid var(--line2);display:flex;flex-direction:column;overflow-y:auto;padding:8px 0}
.ws{display:flex;align-items:center;gap:8px;padding:8px 12px;margin:0 6px;border-radius:6px;cursor:default}
.wsico{width:22px;height:22px;border-radius:5px;background:var(--green);color:#fff;font-weight:700;font-size:12px;display:grid;place-items:center;flex:none}
.wsname{font-weight:600}
.ghead{display:flex;align-items:center;gap:5px;padding:12px 14px 3px;color:var(--muted);font-size:11.5px;font-weight:600;user-select:none}
.ghead .lk{margin-left:auto;font-size:10px}
.nav a{display:flex;align-items:center;gap:8px;padding:4px 14px 4px 20px;color:var(--ink);text-decoration:none;font-size:13.5px;cursor:pointer}
.nav a:hover{background:var(--hover)}.nav a.on{background:var(--sel);font-weight:500}
.nav a .ico{width:18px;text-align:center;flex:none;opacity:.9}
.nav a .cnt{margin-left:auto;color:var(--faint);font-size:11px}
.sfoot{margin-top:auto;padding:10px 16px;color:var(--faint);font-size:11px;border-top:1px solid var(--line2)}
.main{overflow-y:auto}
.topbar{display:flex;align-items:center;gap:6px;padding:9px 18px;color:var(--muted);font-size:13px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:3}
.crumb a{color:var(--muted);text-decoration:none;cursor:pointer}.crumb a:hover{text-decoration:underline}
.crumb b{color:var(--ink);font-weight:500}.crumb .sep{color:var(--faint);margin:0 5px}
.lockb{margin-left:8px;font-size:11px;color:var(--muted);background:var(--side);border:1px solid var(--line2);border-radius:5px;padding:1px 7px}
.page{padding:22px 44px 90px;max-width:1180px}
.ptitle{display:flex;align-items:center;gap:11px;font-size:29px;font-weight:700;margin:0 0 6px}
.ptitle .pico{font-size:29px}
.pdesc{color:var(--muted);font-size:13px;margin:0 0 6px;max-width:82ch;line-height:1.5}
.tabs{display:flex;gap:1px;border-bottom:1px solid var(--line);margin:14px 0 0;flex-wrap:wrap}
.tab{font-size:13px;color:var(--muted);padding:6px 10px;border-bottom:2px solid transparent;cursor:pointer;display:flex;gap:5px;align-items:center}
.tab:hover{color:var(--ink)}.tab.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:500}
.rowcount{color:var(--faint);font-size:12px;margin-left:6px}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--green);color:#fff;border:0;border-radius:6px;padding:6px 12px;font-size:13px;font-weight:500;cursor:pointer;margin:12px 0 4px}
.btn.sec{background:var(--side);color:var(--ink);border:1px solid var(--line2)}
table{border-collapse:collapse;width:100%;margin-top:4px}
th{text-align:left;font-weight:400;color:var(--muted);font-size:12.5px;padding:7px 10px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);white-space:nowrap}
th .ti{opacity:.55;margin-right:4px;font-size:11px}
td{padding:7px 10px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);font-size:13.5px;vertical-align:middle}
td:first-child{font-weight:500}
tr.click{cursor:pointer}tr.click:hover td{background:#f6faf9}
.title-cell{display:flex;align-items:center;gap:7px}.title-cell .di{opacity:.8}
.opener{color:var(--faint);font-size:11px;margin-left:6px;opacity:0}
tr.click:hover .opener{opacity:1}
.pill{display:inline-flex;align-items:center;border-radius:4px;padding:2px 8px;font-size:12px;white-space:nowrap}
.p-green{background:#DBEEE9;color:#177e68}.p-amber{background:#FBEFD3;color:#95661a}.p-grey{background:#E9E9E7;color:#605c57}
.p-teal{background:#D6E8EA;color:#2a6b72}.p-rose{background:#F4E2DB;color:#9a4b34}.p-blue{background:#DEE7EF;color:#3a5a78}.p-purple{background:#E8E2F0;color:#5b4a7a}
.multi{display:flex;gap:4px;flex-wrap:wrap}
.person{display:inline-flex;align-items:center;gap:6px}
.av{width:20px;height:20px;border-radius:50%;color:#fff;font-size:10px;font-weight:600;display:grid;place-items:center;flex:none}
.lnk{color:#3a5a78;text-decoration:none;border-bottom:1px solid #cdd8e2;cursor:pointer}
.rel{background:#eef0f0;border-radius:4px;padding:1px 8px;font-size:12.5px;color:var(--ink);cursor:pointer;text-decoration:none;display:inline-block}
.rel:hover{background:#e2e6e6}
.mut{color:var(--muted)}.mask{letter-spacing:1px;color:var(--faint)}
.newbadge{background:#DBEEE9;color:#177e68;font-size:9px;font-weight:700;border-radius:4px;padding:0 4px;margin-left:6px}
/* board */
.board{display:flex;gap:14px;overflow-x:auto;padding-top:12px}
.bcol{min-width:236px;flex:1}
.bch{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;padding:4px 4px 8px}
.bch .bc{color:var(--faint);font-size:12px}.bch .dot{width:8px;height:8px;border-radius:50%}
.card{background:#fbfbfa;border:1px solid var(--line2);border-radius:7px;padding:9px 11px;margin-bottom:8px;box-shadow:0 1px 1px rgba(0,0,0,.03);cursor:pointer}
.card:hover{background:#f4f8f7}
.card .ct{font-size:13.5px;font-weight:500;margin-bottom:7px}
.card .cm{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
/* detail */
.detail{max-width:900px}
.dtitle{display:flex;align-items:center;gap:11px;font-size:30px;font-weight:700;margin:6px 0 14px}
.props{border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px 0;margin-bottom:18px}
.prow{display:grid;grid-template-columns:170px 1fr;gap:10px;padding:5px 2px;font-size:13.5px;align-items:center}
.prow .pk{color:var(--muted);display:flex;align-items:center;gap:7px}.prow .pk .pi{opacity:.6;width:15px;text-align:center}
.h3{font-size:15px;font-weight:600;margin:20px 0 8px;display:flex;align-items:center;gap:7px}
.chk{list-style:none;padding:0;margin:0}
.chk li{padding:5px 0;font-size:13.5px;display:flex;gap:9px;align-items:center;border-bottom:1px solid var(--line2)}
.chk li .box{width:15px;height:15px;border:1.5px solid var(--faint);border-radius:3px;flex:none}
.chk li.done .box{background:var(--green);border-color:var(--green)}.chk li.done span{color:var(--muted);text-decoration:line-through}
.callout{background:var(--side);border:1px solid var(--line2);border-radius:8px;padding:10px 13px;font-size:13px;margin:10px 0;display:flex;gap:9px;align-items:flex-start}
.callout.g{background:#eef7f4;border-color:#cfe3dd}.callout.a{background:#fbf3e0;border-color:#f0dda6}
.bodytext{font-size:13.5px;color:#4a4744;line-height:1.6;max-width:75ch}
/* dashboard */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px}
.dcard{border:1px solid var(--line2);border-radius:10px;padding:14px 16px}.dcard.full{grid-column:1/3}
.dch{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;margin-bottom:10px}.dch .cnt{margin-left:auto;font-size:11px;color:var(--muted);background:var(--side);border:1px solid var(--line2);border-radius:20px;padding:1px 9px}
.drow{display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--line);font-size:13px}.drow:first-of-type{border-top:0}.drow .dl{margin-left:auto;color:var(--muted);font-size:12px;white-space:nowrap}
.warn{background:#FBEFD3;color:#95661a;border:1px solid #f0dda6;border-radius:7px;padding:8px 11px;font-size:12.5px;margin-top:8px}
.exclude{margin-top:18px;font-size:12.5px;color:var(--muted);background:var(--side);border:1px dashed var(--line2);border-radius:8px;padding:10px 14px}
/* folders */
.mirror{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12.5px;color:var(--muted);margin:8px 0 16px}
.mirror .tool{background:var(--side);border:1px solid var(--line2);border-radius:6px;padding:3px 9px;color:var(--ink);font-weight:500}
.fcols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fcard{border:1px solid var(--line2);border-radius:10px;overflow:hidden}
.fcard .fh{padding:10px 14px;font-weight:600;font-size:14px}
.fcard.team .fh{background:#eef7f4;color:#177e68}.fcard.admin .fh{background:#fbf3e0;color:#95661a}
.tree{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;line-height:1.85;padding:12px 14px;overflow-x:auto}
.tree .cm{color:var(--faint)}.tree .cl{color:#177e68}.tree .nm{color:#95661a}
.subset{background:var(--sel);border:1px solid #cfe3dd;border-radius:10px;padding:12px 16px;margin-top:16px}
.subset .st{font-weight:600;font-size:13.5px;margin-bottom:8px}.subset .chips{display:flex;flex-wrap:wrap;gap:6px}
.subset .fchip{background:#fff;border:1px solid var(--line2);border-radius:6px;padding:4px 10px;font-size:12.5px;font-family:ui-monospace,Menlo,Consolas,monospace}
</style>

// ============ cell + renderers ============
function cell(v,t){
 if(v==null)return '<span class="mut">—</span>';
 if(t=='pill')return pill(v[0],v[1]);
 if(t=='person')return v=='—'?'<span class="mut">—</span>':av(v);
 if(t=='mask')return '<span class="mask">'+v+'</span>';
 if(t=='text')return Array.isArray(v)?v[0]:''+v;
 if(t=='title'){var nw=/\|NEW$/.test(v);var nm=(''+v).replace(/\|NEW$/,'');return '<span class="title-cell"><span class="di">▦</span>'+nm+(nw?nb():'')+'</span>';}
 return v;
}
function ticon(t){return ({title:'',text:'≡',pill:'◉',person:'🙂',mask:'•'})[t]||'≡';}
function tableHTML(p){
 var h='';if(p.callout)h+='<div class="callout"><span>🔒</span><span>'+p.callout+'</span></div>';
 h+='<div class="tabs"><span class="tab on">▦ Table</span><span class="rowcount">'+p.rows.length+' rows</span></div>';
 h+='<table><thead><tr>'+p.cols.map(function(c){return '<th><span class="ti">'+ticon(c[1])+'</span>'+c[0]+'</th>';}).join('')+'</tr></thead><tbody>';
 h+=p.rows.map(function(r){return '<tr>'+r.map(function(v,i){return '<td>'+cell(v,p.cols[i][1])+'</td>';}).join('')+'</tr>';}).join('');
 h+='</tbody></table>';if(p.after)h+=p.after;return h;
}
function pageShell(ic,nm,desc,body){return '<div class="ptitle"><span class="pico">'+ic+'</span>'+nm+'</div>'+(desc?'<p class="pdesc">'+desc+'</p>':'')+body;}

// -------- Tasks (GTD, multiple views) --------
var TASK_VIEWS=[['inbox','📥 Inbox'],['week','▥ This Week'],['future','🗓️ Future / Someday'],['assignee','👥 By Assignee'],['all','▦ All']];
function taskRow(id){var t=TK[id];var proj=t.proj?pill(PR[t.proj].n.split(' — ')[0]||PR[t.proj].n,'grey'):(t.area?pill(t.area,'purple'):'');
 return '<div class="card" data-open="task/'+id+'"><div class="ct">'+t.n+'</div><div class="cm">'+(t.a?av(t.a):'<span class="mut">unassigned</span>')+(t.dd?'<span class="mut">'+t.dd+'</span>':'')+proj+(t.wait?pill('waiting: '+t.wait,'rose'):'')+'</div></div>';}
function tasksView(view){
 var ids=Object.keys(TK);
 var h='<p class="pdesc">The single GTD database — every idea, reminder and to-do lands here, gets processed, then surfaces on the right board. The lever is <b>Do&nbsp;Date</b>: set it to this week and it shows in <b>This Week</b>; leave it future/blank and it waits in <b>Someday</b>. One database, many views.</p>';
 h+='<div class="tabs">'+TASK_VIEWS.map(function(v){return '<span class="tab'+(v[0]==view?' on':'')+'" data-view="'+v[0]+'">'+v[1]+'</span>';}).join('')+'</div>';
 if(view=='inbox'){
   var inbox=ids.filter(function(k){return TK[k].s[0]=='Inbox';});
   h+='<p class="mut" style="font-size:12.5px;margin:12px 0 4px">Unprocessed captures — during a review, set an assignee, a Do Date and a Project/Area to process each one.</p>';
   h+='<div style="max-width:640px">'+inbox.map(taskRow).join('')+'</div>';
 } else if(view=='week'){
   var cols=[['Next','blue'],['In progress','amber'],['Waiting','rose']];
   h+='<div class="board">'+cols.map(function(c){
     var items=ids.filter(function(k){return TK[k].s[0]==c[0]&&TK[k].dd&&!/Aug|Sep/.test(TK[k].dd);});
     return '<div class="bcol"><div class="bch"><span class="dot" style="background:'+({blue:'#4aabc2',amber:'#e0a94a',rose:'#c24a6b'})[c[1]]+'"></span>'+c[0]+'<span class="bc">'+items.length+'</span></div>'+(items.map(taskRow).join('')||'<div class="mut" style="font-size:12px;padding:4px">—</div>')+'</div>';
   }).join('')+'</div>';
 } else if(view=='future'){
   var fut=ids.filter(function(k){return /Aug|Sep/.test(TK[k].dd);});
   h+='<p class="mut" style="font-size:12.5px;margin:12px 0 4px">Do Date is weeks out — hidden from the daily view; each item auto-reappears in This Week when its date arrives.</p>';
   h+='<div style="max-width:640px">'+fut.map(taskRow).join('')+'</div>';
 } else if(view=='assignee'){
   var people=['Zsolt','Dipro','Austin','Saju','Ana'];
   h+='<div class="board">'+people.map(function(pn){
     var items=ids.filter(function(k){return TK[k].a==pn&&TK[k].s[0]!='Done';});
     return '<div class="bcol"><div class="bch">'+av(pn)+'<span class="bc">'+items.length+'</span></div>'+(items.map(taskRow).join('')||'<div class="mut" style="font-size:12px;padding:4px">—</div>')+'</div>';
   }).join('')+'</div>';
 } else {
   h+='<table style="margin-top:12px"><thead><tr><th><span class="ti">≡</span>Task</th><th><span class="ti">◉</span>Status</th><th><span class="ti">🙂</span>Assignee</th><th><span class="ti">≡</span>Do Date</th><th><span class="ti">↗</span>Project / Area</th></tr></thead><tbody>';
   h+=ids.map(function(k){var t=TK[k];return '<tr class="click" data-open="task/'+k+'"><td><span class="title-cell"><span class="di">▦</span>'+t.n+'</span></td><td>'+pill(t.s[0],t.s[1])+'</td><td>'+(t.a?av(t.a):'<span class="mut">—</span>')+'</td><td>'+(t.dd||'<span class="mut">—</span>')+'</td><td>'+(t.proj?'<span class="rel">'+PR[t.proj].n+'</span>':(t.area?pill(t.area,'purple'):'<span class="mut">—</span>'))+'</td></tr>';}).join('');
   h+='</tbody></table>';
 }
 return h;
}

// ============ router ============
function spaceOf(route){
 var id=route.split('/')[0];
 if(['home','folders'].indexOf(id)>-1)return '';
 if(id=='client'){return 'team';}if(id=='project'){return 'team';}if(id=='task')return 'team';
 if(id=='mytasks'||id=='my1on1')return 'my';
 if(id=='person'||id=='personnel')return 'admin';
 if(TEAM_ORDER.indexOf(id)>-1)return 'team';
 if(ADMIN_ORDER.indexOf(id)>-1)return 'admin';
 return '';
}
function crumbFor(route){
 var seg=route.split('/');var id=seg[0];
 var sp=spaceOf(route);var spName=sp=='team'?'Delivery':(sp=='admin'?'Admin':(sp=='my'?'My Space':''));
 function root(){return spName?'<a data-go="home">'+spName+'</a><span class="sep">/</span>':'';}
 if(id=='client')return root()+'<a data-go="clients">Clients</a><span class="sep">/</span><b>'+CL[seg[1]].n+'</b>';
 if(id=='project'){var pr=PR[seg[1]];return root()+'<a data-go="projects">Projects</a><span class="sep">/</span><b>'+pr.n+'</b>';}
 if(id=='task'){return root()+'<a data-go="tasks">Tasks</a><span class="sep">/</span><b>'+TK[seg[1]].n+'</b>';}
 if(id=='person'){return root()+'<a data-go="personnel">Personnel</a><span class="sep">/</span><b>'+PEO[seg[1]].n+'</b>';}
 var nm=LABELS[id]?LABELS[id][1]:(id=='home'?'Home':(id=='folders'?'Folder structure':(TP[id]?TP[id].nm:id)));
 return root()+'<b>'+nm+'</b>';
}
var curView='week';
function render(route){
 var seg=route.split('/');var id=seg[0];var el=document.getElementById('page');
 if(id=='home')el.innerHTML=homePage();
 else if(id=='folders')el.innerHTML=foldersPage();
 else if(id=='dash')el.innerHTML=dashPage();
 else if(id=='mytasks')el.innerHTML=myTasks();
 else if(id=='my1on1')el.innerHTML=my1on1();
 else if(id=='personnel')el.innerHTML=renderPersonnel();
 else if(id=='person')el.innerHTML=personDetail(seg[1]);
 else if(id=='tasks')el.innerHTML=pageShell('📥','Tasks',null,tasksView(curView));
 else if(id=='clients')el.innerHTML=clientsTable();
 else if(id=='projects')el.innerHTML=projectsBoard();
 else if(id=='client')el.innerHTML=clientDetail(seg[1]);
 else if(id=='project')el.innerHTML=projectDetail(seg[1]);
 else if(id=='task')el.innerHTML=taskDetail(seg[1]);
 else if(TP[id])el.innerHTML=pageShell(TP[id].ic,TP[id].nm,TP[id].desc,tableHTML(TP[id]));
 else el.innerHTML='<p>—</p>';
 // crumb / lock
 document.getElementById('crumb').innerHTML=crumbFor(route);
 var sp=spaceOf(route);
 var lb=document.getElementById('lockb');
 if(sp=='admin'){lb.style.display='inline';lb.textContent='🔒 Private · Austin · Saju · Ana';}
 else if(sp=='my'){lb.style.display='inline';lb.textContent='👤 Private to you';}
 else lb.style.display='none';
 // active nav
 document.querySelectorAll('.nav a').forEach(function(a){a.classList.toggle('on',a.dataset.go===id||(id=='dash'&&a.dataset.go=='dash'));});
 bindOpens();document.querySelector('.main').scrollTo(0,0);
}
function go(route){render(route);}
window.go=go;
function bindOpens(){
 document.querySelectorAll('[data-open]').forEach(function(e){e.onclick=function(ev){ev.stopPropagation();go(e.getAttribute('data-open'));};});
 document.querySelectorAll('.tab[data-view]').forEach(function(t){t.onclick=function(){curView=t.getAttribute('data-view');go('tasks');};});
}
document.querySelectorAll('.nav a,[data-go]').forEach(function(a){a.addEventListener('click',function(){go(a.dataset.go);});});
document.getElementById('crumb').addEventListener('click',function(ev){var a=ev.target.closest('[data-go]');if(a)go(a.dataset.go);});
document.getElementById('page').addEventListener('click',function(ev){var a=ev.target.closest('[data-go]');if(a){ev.stopPropagation();go(a.dataset.go);}});
go('home');
</script>
